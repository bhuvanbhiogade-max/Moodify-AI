<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moodify Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:#0e0e0e;
    font-family: sans-serif;
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="w-96 p-8 bg-white/5 rounded-3xl backdrop-blur-xl border border-white/10">

<h1 class="text-3xl text-white text-center mb-6">🎧 Moodify</h1>

<input id="username" placeholder="Username"
class="w-full mb-4 p-3 rounded-xl bg-black/40 text-white">

<input id="password" type="password" placeholder="Password"
class="w-full mb-4 p-3 rounded-xl bg-black/40 text-white">

<button onclick="login()"
class="w-full p-3 bg-green-400 rounded-xl font-bold">
Login
</button>

</div>

<script src="script.js"></script>
</body>
</html>
